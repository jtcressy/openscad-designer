name: Cloudflare Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: cloudflare-preview-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    if: >-
      !github.event.pull_request.draft &&
      github.actor != 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Stage deployment artifact
        run: |
          mkdir -p deploy-artifact/assets
          cp dist/worker/worker.js deploy-artifact/worker.js
          cp -R dist/ui/. deploy-artifact/assets/
      - name: Upload deployment artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cloudflare-preview-${{ github.run_id }}-${{ github.run_attempt }}
          path: deploy-artifact/
          if-no-files-found: error
          retention-days: 1

  preview:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: preview
      url: ${{ steps.upload.outputs.deployment-url }}
    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: cloudflare-preview-${{ github.run_id }}-${{ github.run_attempt }}
          path: deploy-artifact
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
      - name: Write trusted deployment config
        shell: bash
        run: |
          cat > wrangler.deploy.jsonc <<'JSON'
          {
            "main": "./deploy-artifact/worker.js",
            "compatibility_date": "2026-07-13",
            "compatibility_flags": ["nodejs_compat"],
            "no_bundle": true,
            "find_additional_modules": false,
            "workers_dev": true,
            "preview_urls": true,
            "assets": {
              "directory": "./deploy-artifact/assets",
              "binding": "ASSETS",
              "run_worker_first": ["/mcp", "/health"]
            }
          }
          JSON
      - name: Install pinned deployment tooling without credentials
        run: npm install --no-save --ignore-scripts --package-lock=false wrangler@4.110.0
      - name: Upload preview
        id: upload
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            versions upload
            --config wrangler.deploy.jsonc
            --name ${{ vars.CLOUDFLARE_PRODUCTION_WORKER_NAME }}
            --preview-alias pr-${{ github.event.pull_request.number }}
